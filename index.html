<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAC.TELL - Persistência em JSON</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.474.0" crossorigin></script>
    <style>
        /* Custom Styles */
        :root {
            --accent: #ffffff;
            --bg: #0a0a0a;
            --graphite: #1a1a1a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url("https://i.pinimg.com/originals/9a/14/d3/9a14d30142344970ada7be125bdcf7a6.gif");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease forwards; }

        .mention {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .file-indicator {
            background: linear-gradient(90deg, #10b981, #059669);
        }
    </style>
</head>
<body>
    <!-- App Root -->
    <div id="app"></div>

    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <script type="text/babel">
        // Global Error Handler
        window.onerror = function(msg, url, line, col, error) {
            console.error("Caught Global Error:", msg, url, line, col, error);
            return false;
        };

        const { useState, useEffect, useRef, useCallback, Component } = React;

        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("Uncaught error:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-black text-white flex flex-col items-center justify-center p-10 text-center">
                            <h1 className="text-2xl font-bold mb-4">Ops! Algo deu errado.</h1>
                            <p className="text-gray-400 mb-8">{this.state.error?.message || "Erro desconhecido"}</p>
                            <button onClick={() => window.location.reload()} className="px-6 py-3 bg-white text-black rounded-xl font-bold">Recarregar Página</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- File System Utilities ---
        const useFileSystem = () => {
            const [dirHandle, setDirHandle] = useState(null);
            const [fileMode, setFileMode] = useState(false);
            const [fsError, setFsError] = useState(null);

            const requestDirectoryAccess = useCallback(async () => {
                if ('showDirectoryPicker' in window) {
                    try {
                        const handle = await window.showDirectoryPicker();
                        setDirHandle(handle);
                        setFileMode(true);
                        setFsError(null);
                        return handle;
                    } catch (err) {
                        console.warn('Directory access denied:', err);
                        setFsError('Acesso ao diretório negado. Usando localStorage como fallback.');
                        return null;
                    }
                } else {
                    setFsError('File System Access API não suportada. Usando localStorage.');
                    return null;
                }
            }, []);

            const getFileHandle = useCallback(async (dirHandleParam, createIfNotExists = true) => {
                if (!dirHandleParam) return null;
                try {
                    let handle = await dirHandleParam.getFileHandle('messages.json', { create: createIfNotExists });
                    return handle;
                } catch (err) {
                    if (createIfNotExists && err.name === 'NotFoundError') {
                        let handle = await dirHandleParam.getFileHandle('messages.json', { create: true });
                        return handle;
                    }
                    throw err;
                }
            }, []);

            const readJsonFile = useCallback(async (dirHandleParam) => {
                const handle = await getFileHandle(dirHandleParam);
                if (!handle) return [];
                const file = await handle.getFile();
                const text = await file.text();
                try {
                    return JSON.parse(text || '[]');
                } catch {
                    return [];
                }
            }, [getFileHandle]);

            const writeJsonFile = useCallback(async (dirHandleParam, data) => {
                const handle = await getFileHandle(dirHandleParam, true);
                if (!handle) return false;
                const writable = await handle.createWritable();
                await writable.write(JSON.stringify(data, null, 2));
                await writable.close();
                return true;
            }, [getFileHandle]);

            const loadMessages = useCallback(async () => {
                if (fileMode && dirHandle) {
                    return await readJsonFile(dirHandle);
                } else {
                    try {
                        const saved = localStorage.getItem('fac_tell_messages');
                        return saved ? JSON.parse(saved) : [];
                    } catch {
                        return [];
                    }
                }
            }, [fileMode, dirHandle, readJsonFile]);

            const saveMessages = useCallback(async (msgs) => {
                if (fileMode && dirHandle) {
                    return await writeJsonFile(dirHandle, msgs);
                } else {
                    try {
                        localStorage.setItem('fac_tell_messages', JSON.stringify(msgs));
                        return true;
                    } catch {
                        return false;
                    }
                }
            }, [fileMode, dirHandle, writeJsonFile]);

            return {
                dirHandle,
                fileMode,
                fsError,
                requestDirectoryAccess,
                loadMessages,
                saveMessages
            };
        };

        // --- Mock Data ---
        const MOCK_USERS = [
            { id: '123456789', username: 'GamerPro', avatar: 'https://picsum.photos/seed/gamer/100' },
            { id: '987654321', username: 'DiscordMod', avatar: 'https://picsum.photos/seed/mod/100' },
            { id: '555666777', username: 'CreativeSoul', avatar: 'https://picsum.photos/seed/creative/100' },
        ];

        // --- Components ---
        const Toast = ({ message, type, onClose }) => {
            React.useEffect(() => {
                const timer = setTimeout(onClose, 4000);
                return () => clearTimeout(timer);
            }, [onClose]);

            return (
                <div className={`fixed bottom-6 right-6 z-50 flex items-center gap-3 px-6 py-4 rounded-2xl border backdrop-blur-xl shadow-2xl animate-fade-in ${
                    type === 'success' 
                        ? 'bg-white/10 border-white/20 text-white' 
                        : 'bg-white/5 border-white/10 text-gray-400'
                }`}>
                    <i data-lucide={type === 'success' ? 'check-circle' : 'alert-circle'} className="w-5 h-5"></i>
                    <span className="font-medium max-w-64">{message}</span>
                </div>
            );
        };

        const SERVER_ICON = 'https://cdn.discordapp.com/icons/1492282209334329346/f75c16597efaf255ab914a3ec206e627.webp?size=1024';

        const App = () => {
            const [messages, setMessages] = React.useState([]);
            const [currentUser, setCurrentUser] = React.useState(null);
            const [inputText, setInputText] = React.useState('');
            const [inputImage, setInputImage] = React.useState(null);
            const [senderName, setSenderName] = React.useState('');
            const [isAnonymous, setIsAnonymous] = React.useState(true);
            const [adminClicks, setAdminClicks] = React.useState(0);
            const [toasts, setToasts] = React.useState([]);
            const [isLoading, setIsLoading] = React.useState(true);
            const [showAdminPanel, setShowAdminPanel] = React.useState(false);
            const [shareMessage, setShareMessage] = React.useState(null);
            const fileInputRef = React.useRef(null);

            const fs = useFileSystem();

            React.useEffect(() => {
                const init = async () => {
                    try {
                        // Try to use existing messages.json or localStorage
                        const savedMessages = await fs.loadMessages();
                        setMessages(savedMessages);

                        const savedUser = localStorage.getItem('fac_tell_user');
                        if (savedUser) setCurrentUser(JSON.parse(savedUser));

                        // Auto-request dir access if messages.json exists (detect project dir)
                        if (!fs.dirHandle && !fs.fsError) {
                            fs.requestDirectoryAccess();
                        }
                    } catch (e) {
                        console.error("Init error:", e);
                    } finally {
                        setTimeout(() => {
                            setIsLoading(false);
                            setTimeout(() => {
                                if (typeof lucide !== 'undefined') lucide.createIcons();
                            }, 100);
                        }, 1500);
                    }
                };
                init();
            }, []);

            React.useEffect(() => {
                if (messages.length > 0) {
                    fs.saveMessages(messages);
                }
            }, [messages, fs]);

            React.useEffect(() => {
                if (currentUser) {
                    localStorage.setItem('fac_tell_user', JSON.stringify(currentUser));
                } else {
                    localStorage.removeItem('fac_tell_user');
                }
            }, [currentUser]);

            React.useEffect(() => {
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }, [toasts, showAdminPanel, shareMessage, messages, fs.fileMode]);

            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setInputImage(reader.result);
                        addToast('Foto carregada!');
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSend = () => {
                if (!inputText.trim()) return;
                if (!isAnonymous && !senderName.trim()) {
                    addToast('O nome é obrigatório para mensagens não anônimas!', 'error');
                    return;
                }

                const newMessage = {
                    id: Math.random().toString(36).substr(2, 9),
                    text: inputText,
                    image: inputImage,
                    author: isAnonymous ? null : { username: senderName },
                    timestamp: Date.now(),
                    isAnonymous: isAnonymous,
                };
                
                setMessages(prev => [newMessage, ...prev]);
                setInputText('');
                setInputImage(null);
                setSenderName('');
                addToast('Enviado! Salvo no arquivo JSON.');
            };

            const handleLogin = () => {
                const randomUser = MOCK_USERS[Math.floor(Math.random() * MOCK_USERS.length)];
                setCurrentUser(randomUser);
                setIsAnonymous(false);
                addToast(`Logado como ${randomUser.username}`);
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setIsAnonymous(true);
                addToast('Sessão encerrada.');
            };

            const handleTitleClick = () => {
                setAdminClicks(prev => {
                    const next = prev + 1;
                    if (next === 10) {
                        setShowAdminPanel(true);
                        addToast('Modo Admin Ativado', 'success');
                        return 0;
                    }
                    return next;
                });
            };

            const deleteMessage = (id) => {
                setMessages(prev => prev.filter(m => m.id !== id));
                addToast('Removido do arquivo JSON.', 'error');
            };

            const safeFormatDate = (ts) => {
                try {
                    const date = new Date(ts);
                    return isNaN(date.getTime()) ? 'Data Inválida' : date.toLocaleString();
                } catch (e) {
                    return 'Data Inválida';
                }
            };

            const renderText = (text) => {
                if (typeof text !== 'string') return '';
                try {
                    const parts = text.split(/(<@\d+>)/g);
                    return parts.map((part, i) => {
                        const match = part.match(/<@(\d+)>/);
                        if (match) {
                            const user = (MOCK_USERS || []).find(u => u.id === match[1]);
                            return <span key={i} className="mention">@{user ? user.username : match[1]}</span>;
                        }
                        return part;
                    });
                } catch (e) {
                    console.error("Error rendering text", e);
                    return text || '';
                }
            };

            if (isLoading) {
                return (
                    <div className="fixed inset-0 bg-black flex flex-col items-center justify-center gap-6">
                        <div className="w-12 h-12 border border-white/20 border-t-white rounded-full animate-spin"></div>
                        <p className="text-white font-mono tracking-widest uppercase text-[10px]">
                            {fs.fileMode ? 'FAC.TELL - Modo Arquivo JSON...' : 'FAC System Loading...'}
                        </p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-transparent text-white selection:bg-white selection:text-black">
                    {/* Header */}
                    <header className="max-w-xl mx-auto px-6 pt-12 pb-8 flex items-center justify-center">
                        <div onClick={handleTitleClick} className="flex flex-col items-center gap-4 cursor-pointer group relative">
                            <div className="w-16 h-16 rounded-[2rem] overflow-hidden border border-white/10 group-active:scale-90 transition-all shadow-2xl">
                                <img src={SERVER_ICON} className="w-full h-full object-cover" />
                            </div>
                            <h1 className="text-2xl font-black tracking-tighter uppercase italic">FAC<span className="text-gray-500">.</span>TELL</h1>
                            {fs.fileMode && (
                                <div className="file-indicator px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-wider shadow-lg">
                                    <i data-lucide="file-text" className="w-3 h-3 inline mr-1"></i>
                                    JSON Persistente
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-6 pb-24">
                        {/* File Status */}
                        {fs.fsError && (
                            <div className="mb-6 p-4 bg-white/5 border border-yellow-500/30 rounded-2xl backdrop-blur-sm text-yellow-300 text-[11px] font-mono">
                                <i data-lucide="alert-triangle" className="w-4 h-4 inline mr-2"></i>
                                {fs.fsError}
                            </div>
                        )}

                        {/* Input Section */}
                        <div className="space-y-8">
                            <div className="relative group">
                                <textarea 
                                    value={inputText} 
                                    onChange={(e) => setInputText(e.target.value)} 
                                    placeholder="Escreva algo anonimamente... (Salvo direto em messages.json)" 
                                    className="w-full h-56 bg-white/[0.03] border border-white/5 rounded-[2.5rem] p-10 text-lg placeholder:text-gray-700 focus:outline-none focus:border-white/20 focus:bg-white/[0.05] transition-all resize-none"
                                ></textarea>
                                
                                <div className="absolute bottom-8 left-10 right-10 flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <button 
                                            onClick={() => fileInputRef.current.click()}
                                            className={`p-3 rounded-xl border transition-all active:scale-90 ${inputImage ? 'bg-white text-black border-white' : 'bg-white/5 border-white/10 text-gray-500 hover:text-white'}`}
                                        >
                                            <i data-lucide="image" className="w-5 h-5"></i>
                                        </button>
                                        <input 
                                            type="file" 
                                            ref={fileInputRef} 
                                            onChange={handleImageUpload} 
                                            accept="image/*" 
                                            className="hidden" 
                                        />
                                        {inputImage && <span className="text-[10px] font-bold uppercase text-gray-500">Foto Pronta</span>}
                                    </div>
                                    <button 
                                        onClick={handleSend} 
                                        disabled={!inputText.trim()} 
                                        className="w-14 h-14 bg-white text-black rounded-2xl flex items-center justify-center hover:bg-gray-200 disabled:opacity-20 transition-all active:scale-90 shadow-2xl"
                                    >
                                        <i data-lucide="arrow-up" className="w-6 h-6"></i>
                                    </button>
                                </div>
                            </div>

                            <div className="px-4 space-y-4">
                                <div className="flex flex-col gap-4">
                                    <div className="flex items-center gap-4">
                                        <button 
                                            onClick={() => setIsAnonymous(!isAnonymous)} 
                                            className={`flex items-center gap-2 px-4 py-2 rounded-full border transition-all text-[10px] font-black uppercase tracking-widest ${isAnonymous ? 'bg-white/10 border-white/20 text-white' : 'bg-white text-black border-white'}`}
                                        >
                                            <i data-lucide={isAnonymous ? 'eye-off' : 'eye'} className="w-3 h-3"></i>
                                            {isAnonymous ? 'Anônimo' : 'Identificado'}
                                        </button>
                                        
                                        {!isAnonymous && (
                                            <input 
                                                type="text"
                                                value={senderName}
                                                onChange={(e) => setSenderName(e.target.value)}
                                                placeholder="Seu Nome (Obrigatório)"
                                                className="flex-1 bg-white/[0.03] border border-white/10 rounded-full px-6 py-2 text-[10px] font-bold uppercase tracking-widest placeholder:text-gray-700 focus:outline-none focus:border-white/30 transition-all"
                                            />
                                        )}
                                    </div>
                                    
                                    <div className="flex items-center gap-2 text-gray-600">
                                        <i data-lucide="info" className="w-3 h-3"></i>
                                        <p className="text-[10px] font-medium uppercase tracking-wider">✅ Mensagens salvas diretamente em <code className="bg-black px-1 py-0.5 rounded text-emerald-400 font-mono text-[9px]">messages.json</code></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Admin Panel */}
                    {showAdminPanel && (
                        <div className="fixed inset-0 z-50 bg-[#0a0a0a] flex flex-col animate-fade-in">
                            <div className="absolute inset-0 opacity-20 pointer-events-none" style={{ backgroundImage: 'url("data:image/svg+xml,%3Csvg viewBox=\'0 0 256 256\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noiseFilter\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.65\' numOctaves=\'3\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23noiseFilter)\'/%3E%3C/svg%3E")' }}></div>
                            <header className="relative z-10 px-8 py-8 border-b border-white/5 flex items-center justify-between backdrop-blur-md bg-black/20">
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center">
                                        <i data-lucide="shield" className="w-5 h-5 text-black"></i>
                                    </div>
                                    <div>
                                        <h2 className="text-sm font-black uppercase tracking-[0.3em]">Inbox Administrativo</h2>
                                        <div className="text-[10px] text-emerald-400 font-mono mt-1">{fs.fileMode ? '📁 JSON File' : '💾 localStorage'}</div>
                                    </div>
                                </div>
                                <button onClick={() => setShowAdminPanel(false)} className="p-2 hover:bg-white/5 rounded-full transition-colors">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                            </header>
                            
                            <div className="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar max-w-2xl mx-auto w-full">
                                {messages.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-gray-800 gap-4">
                                        <i data-lucide="inbox" className="w-12 h-12 opacity-20"></i>
                                        <p className="text-xs font-bold uppercase tracking-widest">Nenhuma mensagem em messages.json</p>
                                    </div>
                                ) : (
                                    messages.map(msg => (
                                        <div 
                                            key={msg.id} 
                                            onClick={() => setShareMessage(msg)}
                                            className="bg-white/[0.03] border border-white/5 rounded-[2rem] p-8 space-y-6 cursor-pointer hover:bg-white/[0.05] hover:border-white/10 transition-all group"
                                        >
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center overflow-hidden border border-white/10">
                                                        {msg.isAnonymous || !msg.author?.avatar ? <i data-lucide="user" className="w-4 h-4 text-gray-600"></i> : <img src={msg.author?.avatar} className="w-full h-full object-cover" />}
                                                    </div>
                                                    <div>
                                                        <span className="text-[10px] font-bold text-white uppercase block">{msg.isAnonymous ? 'Anônimo' : (msg.author?.username || 'Usuário')}</span>
                                                        <span className="text-[8px] font-mono text-gray-600 uppercase tracking-widest">{safeFormatDate(msg.timestamp)}</span>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <div className="p-3 bg-white text-black rounded-xl group-hover:scale-110 transition-transform">
                                                        <i data-lucide="camera" className="w-4 h-4"></i>
                                                    </div>
                                                    <button 
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            deleteMessage(msg.id);
                                                        }} 
                                                        className="p-3 bg-white/5 text-gray-500 rounded-xl hover:bg-red-500/20 hover:text-red-500 transition-all active:scale-90"
                                                    >
                                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            <p className="text-gray-200 text-lg leading-relaxed">{renderText(msg.text)}</p>
                                            {msg.image && <img src={msg.image} className="w-full h-64 object-cover rounded-2xl border border-white/10" />}
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {/* Share Modal */}
                    {shareMessage && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-6">
                            <div onClick={() => setShareMessage(null)} className="absolute inset-0 bg-[#0a0a0a]/95 backdrop-blur-3xl"></div>
                            <div className="absolute inset-0 opacity-10 pointer-events-none" style={{ backgroundImage: 'url("data:image/svg+xml,%3Csvg viewBox=\'0 0 256 256\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noiseFilter\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.65\' numOctaves=\'3\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23noiseFilter)\'/%3E%3C/svg%3E")' }}></div>
                            <div className="relative flex flex-col items-center gap-10 animate-fade-in w-full max-w-2xl">
                                <div id="share-card" className="w-full aspect-[16/9] bg-black rounded-[3rem] p-12 flex flex-col items-center justify-between text-center shadow-[0_40px_100px_rgba(255,255,255,0.05)] relative overflow-hidden border border-white/10">
                                    {/* Scribbles Background */}
                                    <div className="absolute inset-0 opacity-30 pointer-events-none">
                                        <svg width="100%" height="100%" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" className="filter blur-[0.5px]">
                                            <path d="M-50,150 C150,50 350,250 550,150 S750,50 850,150" stroke="white" fill="none" strokeWidth="1" strokeLinecap="round" strokeDasharray="2,4" />
                                            <path d="M-20,300 C180,350 380,250 580,300 S780,350 880,300" stroke="white" fill="none" strokeWidth="0.5" strokeLinecap="round" />
                                            <path d="M200,-50 C300,50 100,150 200,250 S300,450 200,550" stroke="white" fill="none" strokeWidth="0.8" strokeLinecap="round" opacity="0.5" />
                                            <path d="M600,-50 C500,50 700,150 600,250 S500,450 600,550" stroke="white" fill="none" strokeWidth="0.8" strokeLinecap="round" opacity="0.5" />
                                            <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" /></filter>
                                            <rect width="100%" height="100%" filter="url(#noise)" opacity="0.05" />
                                        </svg>
                                    </div>

                                    <div className="relative z-10 flex items-center justify-between w-full">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 rounded-xl overflow-hidden border border-white/10 shadow-2xl">
                                                <img src={SERVER_ICON} className="w-full h-full object-cover" />
                                            </div>
                                            <div className="text-left">
                                                <span className="text-[10px] font-bold text-white/40 uppercase tracking-[0.4em] block">FAC.TELL</span>
                                                {!shareMessage.isAnonymous && shareMessage.author?.username && (
                                                    <span className="text-[8px] font-bold text-white/60 uppercase tracking-widest">De: {shareMessage.author.username}</span>
                                                )}
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-[8px] font-mono text-white/20 uppercase tracking-widest">{safeFormatDate(shareMessage.timestamp)}</span>
                                        </div>
                                    </div>
                                    
                                    <div className="relative z-10 w-full flex gap-8 items-center justify-center">
                                        {shareMessage.image && (
                                            <div className="w-1/3 aspect-square rounded-2xl overflow-hidden border border-white/10 shadow-xl shrink-0">
                                                <img src={shareMessage.image} className="w-full h-full object-cover" />
                                            </div>
                                        )}
                                        <div className="flex-1 text-center">
                                            <p className="text-white text-3xl font-black leading-tight tracking-tighter break-words italic drop-shadow-lg">
                                                "{shareMessage.text}"
                                            </p>
                                        </div>
                                    </div>

                                    <div className="relative z-10 flex flex-col items-center gap-2">
                                        <div className="h-1 w-12 bg-white/10 rounded-full mb-2"></div>
                                        <p className="text-[8px] font-black text-white/20 uppercase tracking-[0.3em]">Responda no servidor</p>
                                    </div>
                                </div>
                                
                                <div className="flex flex-col items-center gap-4">
                                    <div className="flex items-center gap-2 px-6 py-3 bg-white/5 border border-white/10 rounded-full backdrop-blur-md">
                                        <i data-lucide="camera" className="w-4 h-4 text-white"></i>
                                        <p className="text-white text-[10px] font-black uppercase tracking-widest">Pronto para o print</p>
                                    </div>
                                    <button onClick={() => setShareMessage(null)} className="text-[10px] font-black uppercase tracking-widest text-gray-600 hover:text-white transition-colors">Fechar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toasts */}
                    <div className="fixed bottom-0 right-0 p-6 pointer-events-none z-[100]">
                        {toasts.map(toast => (
                            <Toast key={toast.id} message={toast.message} type={toast.type} onClose={() => setToasts(prev => prev.filter(t => t.id !== toast.id))} />
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
