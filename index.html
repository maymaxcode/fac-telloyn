<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAC.TELL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.474.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            margin: 0;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url("https://i.pinimg.com/originals/84/0f/12/840f1220e5ed1fa2ba9c9af6a1d1fe9d.gif");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glass-input { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(12px);
            transition: all 0.2s ease;
        }
        .glass-input:focus { border-color: rgba(255,255,255,0.2); outline: none; background: rgba(255, 255, 255, 0.05); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 0px; }
        .minimal-line { position: absolute; background: rgba(255,255,255,0.08); }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = 'https://pgvuymtbazkhggxpfntr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_589VB1cAV3RDSCZ-d2LqpA_LN6epmPY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const SERVER_ICON = 'https://cdn.discordapp.com/icons/1492282209334329346/f75c16597efaf255ab914a3ec206e627.webp?size=1024';

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [isAnonymous, setIsAnonymous] = useState(true);
            const [senderName, setSenderName] = useState('');
            const [showAdmin, setShowAdmin] = useState(false);
            const [adminClicks, setAdminClicks] = useState(0);
            const [adminAuthenticated, setAdminAuthenticated] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [shareMessage, setShareMessage] = useState(null);
            const [adminTab, setAdminTab] = useState('messages');
            
            const [webhookUrl, setWebhookUrl] = useState('');
            const [webhookContent, setWebhookContent] = useState('');
            const [webhookMention, setWebhookMention] = useState('');
            const [webhookName, setWebhookName] = useState('');
            const [webhookAvatar, setWebhookAvatar] = useState('');
            const [webhookFile, setWebhookFile] = useState(null);

            const shareRef = useRef(null);
            const fileInputRef = useRef(null);

            const fetchMessages = async () => {
                const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: false });
                setMessages(data || []);
            };

            useEffect(() => {
                fetchMessages();
                const sub = supabaseClient.channel('messages').on('postgres_changes', { event: '*', table: 'messages' }, fetchMessages).subscribe();
                return () => supabaseClient.removeChannel(sub);
            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [messages, shareMessage, showAdmin, adminTab, adminAuthenticated]);

            const downloadCard = async () => {
                if (!shareRef.current) return;
                const canvas = await html2canvas(shareRef.current, { scale: 3, backgroundColor: '#000', useCORS: true });
                const link = document.createElement('a');
                link.download = `factell-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            const handleSend = async () => {
                if(!inputText.trim()) return;
                await supabaseClient.from('messages').insert([{ 
                    text: inputText, 
                    author_name: isAnonymous ? 'Anônimo' : (senderName || 'Agente'), 
                    is_anonymous: isAnonymous 
                }]);
                setInputText(''); setSenderName('');
            };

            const checkPassword = () => {
                const pass = adminPassword.toLowerCase();
                if(pass === 'fac2026') {
                    setAdminAuthenticated(true);
                } else {
                    alert('Acesso Negado');
                    setAdminPassword('');
                }
            };

            const sendWebhook = async () => {
                if(!webhookUrl || (!webhookContent && !webhookFile)) return alert('URL e Conteúdo/Arquivo são necessários');
                
                const formData = new FormData();
                const content = webhookMention ? `<@${webhookMention}> ${webhookContent}` : webhookContent;
                
                const payload = { content: content };
                if (webhookName.trim()) payload.username = webhookName;
                if (webhookAvatar.trim()) payload.avatar_url = webhookAvatar;

                formData.append('payload_json', JSON.stringify(payload));
                if (webhookFile) formData.append('file', webhookFile);

                try {
                    await fetch(webhookUrl, { method: 'POST', body: formData });
                    alert('Transmitido com sucesso');
                    setWebhookContent('');
                    setWebhookFile(null);
                } catch (e) {
                    alert('Erro na transmissão');
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 relative">
                    {/* UI Principal */}
                    <div className="w-full max-w-lg space-y-10 relative z-10">
                        <header className="text-center space-y-4">
                            <img 
                                onClick={() => { setAdminClicks(v => v + 1); if(adminClicks >= 8) setShowAdmin(true); }}
                                src={SERVER_ICON} 
                                className="w-24 h-24 rounded-[2.5rem] mx-auto cursor-pointer border border-white/10 active:scale-90 transition-all shadow-2xl" 
                            />
                            <h1 className="text-4xl font-black italic tracking-tighter uppercase">FAC.TELL</h1>
                        </header>

                        <div className="space-y-4">
                            <textarea 
                                value={inputText} 
                                onChange={e => setInputText(e.target.value)}
                                placeholder="Insira sua mensagem..."
                                className="w-full h-64 glass-input rounded-[2.5rem] p-8 text-lg resize-none placeholder:opacity-10"
                            />
                            
                            <div className="flex gap-3">
                                <button 
                                    onClick={() => setIsAnonymous(!isAnonymous)}
                                    className={`flex-1 py-5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all border ${isAnonymous ? 'bg-white text-black border-white' : 'bg-transparent border-white/10 opacity-40'}`}
                                >
                                    {isAnonymous ? 'Anônimo' : 'Identificado'}
                                </button>
                                <button onClick={handleSend} disabled={!inputText.trim()} className="px-10 bg-white text-black rounded-2xl disabled:opacity-20 active:scale-95 transition-all">
                                    <i data-lucide="send"></i>
                                </button>
                            </div>

                            {!isAnonymous && (
                                <input 
                                    value={senderName} onChange={e => setSenderName(e.target.value)}
                                    placeholder="NOME OU CODINOME"
                                    className="w-full glass-input rounded-2xl p-5 text-[10px] font-black uppercase tracking-widest text-center"
                                />
                            )}

                            <p className="text-[9px] text-center uppercase tracking-widest opacity-30 font-bold leading-relaxed">
                                se quer falar quem é e só clicar pra ser identificado
                            </p>
                        </div>
                    </div>

                    <div className="fixed bottom-6 left-6 text-[8px] font-black uppercase tracking-[0.4em] opacity-20">by suit</div>

                    {/* Admin Dashboard */}
                    {showAdmin && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-2xl z-50 flex items-center justify-center p-4">
                            {!adminAuthenticated ? (
                                <div className="w-full max-w-sm glass-input p-10 rounded-[2.5rem] text-center space-y-6">
                                    <h2 className="mono text-[10px] font-black uppercase tracking-[0.4em] opacity-40">Restricted Access</h2>
                                    <input 
                                        type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && checkPassword()}
                                        placeholder="PASSWORD"
                                        className="w-full bg-transparent border-b border-white/10 p-4 text-center mono tracking-[0.5em] focus:outline-none"
                                    />
                                    <div className="flex gap-2">
                                        <button onClick={checkPassword} className="flex-1 py-4 bg-white text-black rounded-xl text-[10px] font-black uppercase">Unlock</button>
                                        <button onClick={() => { setShowAdmin(false); setAdminClicks(0); }} className="flex-1 py-4 bg-white/5 rounded-xl text-[10px] font-black uppercase">Cancel</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full max-w-4xl h-[85vh] border border-white/10 rounded-[3rem] flex flex-col overflow-hidden bg-black shadow-2xl">
                                    <div className="p-8 border-b border-white/5 flex justify-between items-center bg-white/[0.01]">
                                        <div className="flex gap-8">
                                            <button onClick={() => setAdminTab('messages')} className={`text-[10px] font-black uppercase tracking-widest ${adminTab === 'messages' ? 'opacity-100 underline underline-offset-8' : 'opacity-20'}`}>Registros</button>
                                            <button onClick={() => setAdminTab('webhook')} className={`text-[10px] font-black uppercase tracking-widest ${adminTab === 'webhook' ? 'opacity-100 underline underline-offset-8' : 'opacity-20'}`}>Transmissor Webhook</button>
                                        </div>
                                        <button onClick={() => { setShowAdmin(false); setAdminAuthenticated(false); setAdminClicks(0); }} className="opacity-40 hover:opacity-100 transition-all"><i data-lucide="x"></i></button>
                                    </div>

                                    <div className="flex-1 overflow-y-auto p-10">
                                        {adminTab === 'messages' ? (
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {messages.map(m => (
                                                    <div key={m.id} className="p-8 border border-white/5 rounded-[2rem] hover:bg-white/[0.02] transition-all group">
                                                        <div className="flex justify-between mb-4">
                                                            <span className="text-[10px] font-black opacity-30 uppercase tracking-widest">{m.author_name}</span>
                                                            <div className="flex gap-4 opacity-0 group-hover:opacity-100 transition-all">
                                                                <button onClick={() => setShareMessage(m)}><i data-lucide="share-2" className="w-4 h-4"></i></button>
                                                                <button onClick={async () => { if(confirm('Apagar permanentemente?')) await supabaseClient.from('messages').delete().eq('id', m.id) }} className="text-red-500/50 hover:text-red-500"><i data-lucide="trash" className="w-4 h-4"></i></button>
                                                            </div>
                                                        </div>
                                                        <p className="text-xl italic opacity-80 leading-snug">"{m.text}"</p>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            <div className="max-w-xl mx-auto space-y-6">
                                                <div className="space-y-4">
                                                    <div className="space-y-2">
                                                        <label className="text-[9px] uppercase font-black opacity-30 ml-2">Destino (Webhook URL)</label>
                                                        <input value={webhookUrl} onChange={e => setWebhookUrl(e.target.value)} placeholder="https://discord.com/api/webhooks/..." className="w-full glass-input rounded-xl p-4 text-xs mono" />
                                                    </div>
                                                    
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <div className="space-y-2">
                                                            <label className="text-[9px] uppercase font-black opacity-30 ml-2">Personalizar Nome (Opcional)</label>
                                                            <input value={webhookName} onChange={e => setWebhookName(e.target.value)} placeholder="Nome do Bot" className="w-full glass-input rounded-xl p-4 text-xs mono" />
                                                        </div>
                                                        <div className="space-y-2">
                                                            <label className="text-[9px] uppercase font-black opacity-30 ml-2">Marcar Usuário/Cargo (ID)</label>
                                                            <input value={webhookMention} onChange={e => setWebhookMention(e.target.value)} placeholder="ID" className="w-full glass-input rounded-xl p-4 text-xs mono" />
                                                        </div>
                                                    </div>

                                                    <div className="space-y-2">
                                                        <label className="text-[9px] uppercase font-black opacity-30 ml-2">Personalizar Avatar (URL Opcional)</label>
                                                        <input value={webhookAvatar} onChange={e => setWebhookAvatar(e.target.value)} placeholder="URL da imagem .png/.jpg" className="w-full glass-input rounded-xl p-4 text-xs mono" />
                                                    </div>
                                                    
                                                    <div className="space-y-2">
                                                        <label className="text-[9px] uppercase font-black opacity-30 ml-2">Arquivo da Galeria</label>
                                                        <div className="flex items-center gap-4">
                                                            <button onClick={() => fileInputRef.current.click()} className="flex-1 py-4 border border-dashed border-white/20 rounded-xl text-[10px] font-bold uppercase opacity-60 hover:opacity-100 hover:border-white/40 transition-all">
                                                                {webhookFile ? `Selecionado: ${webhookFile.name}` : 'Selecionar Imagem da Galeria'}
                                                            </button>
                                                            {webhookFile && <button onClick={() => setWebhookFile(null)} className="p-4 text-red-500 bg-red-500/10 rounded-xl hover:bg-red-500/20 transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button>}
                                                            <input type="file" ref={fileInputRef} onChange={e => setWebhookFile(e.target.files[0])} className="hidden" accept="image/*" />
                                                        </div>
                                                    </div>

                                                    <div className="space-y-2">
                                                        <label className="text-[9px] uppercase font-black opacity-30 ml-2">Corpo da Transmissão</label>
                                                        <textarea value={webhookContent} onChange={e => setWebhookContent(e.target.value)} placeholder="Digite o conteúdo da mensagem..." className="w-full h-40 glass-input rounded-2xl p-6 text-xs mono resize-none" />
                                                    </div>

                                                    <button onClick={sendWebhook} className="w-full py-5 bg-white text-black rounded-xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all shadow-xl">Transmitir Dados</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Export Card */}
                    {shareMessage && (
                        <div className="fixed inset-0 bg-black/95 z-[100] flex flex-col items-center justify-center p-4">
                            <div className="relative border border-white/10 bg-black overflow-hidden shadow-2xl" style={{ width: 'min(90vw, 800px)', aspectRatio: '16/9' }}>
                                <div ref={shareRef} className="w-[1280px] h-[720px] bg-black p-32 flex flex-col justify-between relative overflow-hidden" style={{ transform: `scale(${Math.min((window.innerWidth * 0.9) / 1280, (window.innerHeight * 0.6) / 720)})`, transformOrigin: 'top left' }}>
                                    <div className="minimal-line w-px h-full left-20 top-0"></div>
                                    <div className="minimal-line w-px h-full right-20 top-0"></div>
                                    <div className="minimal-line w-full h-px top-20 left-0"></div>
                                    <div className="minimal-line w-full h-px bottom-20 left-0"></div>
                                    <div className="flex justify-between items-center relative z-10">
                                        <div className="flex items-center gap-6">
                                            <img src={SERVER_ICON} crossOrigin="anonymous" className="w-16 h-16 rounded-2xl" />
                                            <h3 className="text-2xl font-black italic tracking-tighter">FAC.TELL</h3>
                                        </div>
                                        <span className="mono text-xs opacity-20">{new Date(shareMessage.created_at).toLocaleDateString()}</span>
                                    </div>
                                    <div className="relative z-10">
                                        <h2 className={`font-black italic tracking-tight leading-none ${shareMessage.text.length > 60 ? 'text-6xl' : 'text-8xl'}`}>"{shareMessage.text}"</h2>
                                    </div>
                                    <div className="relative z-10">
                                        <span className="text-[10px] font-black uppercase tracking-[0.5em] opacity-30">{shareMessage.author_name}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="mt-12 flex gap-4">
                                <button onClick={downloadCard} className="px-10 py-5 bg-white text-black rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-neutral-200 transition-all">Salvar Arquivo</button>
                                <button onClick={() => setShareMessage(null)} className="px-10 py-5 border border-white/10 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:bg-white/5 transition-all">Fechar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
