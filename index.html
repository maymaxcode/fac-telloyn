<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAC.TELL | Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.474.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("https://i.pinimg.com/originals/9a/14/d3/9a14d30142344970ada7be125bdcf7a6.gif");
            background-size: cover; background-attachment: fixed;
            color: #fff; overflow-x: hidden;
        }
        .line-detail { position: absolute; background: rgba(255,255,255,0.1); pointer-events: none; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = 'https://pgvuymtbazkhggxpfntr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_589VB1cAV3RDSCZ-d2LqpA_LN6epmPY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const SERVER_ICON = 'https://cdn.discordapp.com/icons/1492282209334329346/f75c16597efaf255ab914a3ec206e627.webp?size=1024';

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [inputImage, setInputImage] = useState(null);
            const [isAnonymous, setIsAnonymous] = useState(true);
            const [senderName, setSenderName] = useState('');
            const [showAdmin, setShowAdmin] = useState(false);
            const [adminClicks, setAdminClicks] = useState(0);
            const [shareMessage, setShareMessage] = useState(null);
            const shareRef = useRef(null);

            const fetchMessages = async () => {
                const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: false });
                setMessages(data || []);
            };

            useEffect(() => {
                fetchMessages();
                const sub = supabaseClient.channel('messages').on('postgres_changes', { event: '*', table: 'messages' }, fetchMessages).subscribe();
                return () => supabaseClient.removeChannel(sub);
            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [messages, shareMessage, showAdmin]);

            const downloadCard = async () => {
                if (!shareRef.current) return;
                const canvas = await html2canvas(shareRef.current, {
                    scale: 2,
                    backgroundColor: '#050505',
                    useCORS: true,
                    width: 1280,
                    height: 720
                });
                const link = document.createElement('a');
                link.download = `factell-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            return (
                <div className="min-h-screen">
                    {/* UI PRINCIPAL */}
                    <header className="max-w-xl mx-auto py-20 text-center">
                        <div onClick={() => { setAdminClicks(v => v + 1); if(adminClicks >= 10) setShowAdmin(true); }} className="cursor-pointer">
                            <img src={SERVER_ICON} className="w-20 h-20 rounded-[2rem] mx-auto border border-white/10 shadow-2xl mb-4" />
                            <h1 className="text-3xl font-black italic tracking-tighter uppercase">FAC.TELL</h1>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-6 space-y-8">
                        <textarea value={inputText} onChange={e => setInputText(e.target.value)} placeholder="Escreva aqui..." className="w-full h-64 bg-white/[0.03] border border-white/5 rounded-[2.5rem] p-10 text-xl focus:outline-none focus:border-white/20 transition-all resize-none" />
                        <button onClick={async () => {
                            await supabaseClient.from('messages').insert([{ text: inputText, author_name: isAnonymous ? 'Anônimo' : senderName, is_anonymous: isAnonymous, image: inputImage }]);
                            setInputText(''); setInputImage(null);
                        }} className="w-full py-6 bg-white text-black font-black uppercase tracking-widest rounded-3xl active:scale-95 transition-all">Enviar Relatório</button>
                    </header>

                    {/* MODAL DE ADMIN */}
                    {showAdmin && (
                        <div className="fixed inset-0 bg-black z-50 p-10 overflow-y-auto">
                            <button onClick={() => setShowAdmin(false)} className="mb-10 opacity-50"><i data-lucide="x"></i></button>
                            <div className="grid gap-6 max-w-2xl mx-auto">
                                {messages.map(m => (
                                    <div key={m.id} onClick={() => setShareMessage(m)} className="p-8 bg-white/[0.03] border border-white/5 rounded-[2rem] cursor-pointer hover:bg-white/[0.05]">
                                        <p className="text-xl italic">"{m.text}"</p>
                                        <small className="opacity-30 uppercase font-bold tracking-widest mt-4 block">{m.author_name}</small>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* MODAL DE EXPORTAÇÃO (PRINT) */}
                    {shareMessage && (
                        <div className="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center p-4">
                            
                            {/* PREVIEW ESCALADO PARA A TELA */}
                            <div className="relative overflow-hidden shadow-2xl rounded-3xl border border-white/10" style={{ width: 'min(90vw, 896px)', height: 'min(50.6vw, 504px)' }}>
                                <div 
                                    ref={shareRef}
                                    style={{ 
                                        width: '1280px', height: '720px', 
                                        position: 'absolute', top: '0', left: '0',
                                        transform: `scale(${Math.min(window.innerWidth * 0.9 / 1280, 504 / 720)})`,
                                        transformOrigin: 'top left',
                                        backgroundColor: '#050505'
                                    }}
                                    className="p-20 flex flex-col justify-between"
                                >
                                    {/* LINHAS DE DESIGN (DIVS EM VEZ DE SVG) */}
                                    <div className="line-detail w-full h-[1px] top-[20%] left-0 rotate-[-2deg]"></div>
                                    <div className="line-detail w-full h-[1px] bottom-[30%] left-0 rotate-[1deg]"></div>
                                    <div className="line-detail h-full w-[1px] left-[15%] top-0"></div>
                                    <div className="line-detail h-full w-[1px] right-[15%] top-0"></div>

                                    {/* CONTEÚDO */}
                                    <div className="flex justify-between items-start relative z-10">
                                        <div className="flex items-center gap-6">
                                            <img src={SERVER_ICON} crossOrigin="anonymous" className="w-20 h-20 rounded-3xl" />
                                            <span className="text-2xl font-black tracking-[0.3em] uppercase opacity-80">FAC.TELL</span>
                                        </div>
                                        <span className="text-lg font-mono opacity-30">{new Date(shareMessage.created_at).toLocaleDateString()}</span>
                                    </div>

                                    <div className="text-center px-20 relative z-10">
                                        {shareMessage.image && <img src={shareMessage.image} crossOrigin="anonymous" className="mx-auto mb-10 w-1/3 rounded-3xl shadow-2xl border border-white/10" />}
                                        <h2 className="text-7xl font-black italic leading-tight">"{shareMessage.text}"</h2>
                                    </div>

                                    <div className="flex flex-col items-center gap-4 relative z-10">
                                        <div className="w-20 h-1 bg-white/20 rounded-full"></div>
                                        <span className="text-sm font-bold tracking-[0.5em] uppercase opacity-40">DATABASE ENCRYPTED</span>
                                    </div>
                                </div>
                            </div>

                            {/* BOTÕES */}
                            <div className="mt-10 flex gap-4">
                                <button onClick={downloadCard} className="px-10 py-5 bg-white text-black rounded-2xl font-black uppercase tracking-widest shadow-2xl flex items-center gap-3">
                                    <i data-lucide="download" className="w-5 h-5"></i> Baixar Cartão
                                </button>
                                <button onClick={() => setShareMessage(null)} className="px-10 py-5 bg-white/10 border border-white/10 rounded-2xl font-black uppercase tracking-widest">Fechar</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
