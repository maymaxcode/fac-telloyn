<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAC.TELL | Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.474.0" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        :root { --accent: #ffffff; --bg: #0a0a0a; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url("https://i.pinimg.com/originals/9a/14/d3/9a14d30142344970ada7be125bdcf7a6.gif");
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #ffffff; overflow-x: hidden;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        /* Ajuste para o Card não quebrar em telas pequenas enquanto mantém 1280px para o print */
        .capture-wrapper {
            transform: scale(0.5); /* Mobile default */
            transform-origin: center;
        }
        @media (min-width: 768px) { .capture-wrapper { transform: scale(0.7); } }
        @media (min-width: 1024px) { .capture-wrapper { transform: scale(0.8); } }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configurações Supabase
        const SUPABASE_URL = 'https://pgvuymtbazkhggxpfntr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_589VB1cAV3RDSCZ-d2LqpA_LN6epmPY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const SERVER_ICON = 'https://cdn.discordapp.com/icons/1492282209334329346/f75c16597efaf255ab914a3ec206e627.webp?size=1024';

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
            return (
                <div className={`fixed bottom-6 right-6 z-[100] flex items-center gap-3 px-6 py-4 rounded-2xl border backdrop-blur-xl animate-fade-in ${type === 'success' ? 'bg-white/10 border-white/20 text-white' : 'bg-red-500/20 border-red-500/50 text-white'}`}>
                    <span className="font-medium">{message}</span>
                </div>
            );
        };

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [inputImage, setInputImage] = useState(null);
            const [senderName, setSenderName] = useState('');
            const [isAnonymous, setIsAnonymous] = useState(true);
            const [adminClicks, setAdminClicks] = useState(0);
            const [toasts, setToasts] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [showAdminPanel, setShowAdminPanel] = useState(false);
            const [shareMessage, setShareMessage] = useState(null);
            const fileInputRef = useRef(null);
            const shareRef = useRef(null);

            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
            };

            const downloadScreenshot = async () => {
                if (!shareRef.current) return;
                try {
                    addToast('Renderizando cartão HD...');
                    const canvas = await html2canvas(shareRef.current, {
                        backgroundColor: '#050505',
                        scale: 2, // Aumenta a qualidade
                        useCORS: true,
                        width: 1280,
                        height: 720
                    });
                    const link = document.createElement('a');
                    link.download = `fac-tell-card-${Date.now()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    addToast('Cartão salvo com sucesso!');
                } catch (e) {
                    addToast('Erro ao gerar imagem.', 'error');
                }
            };

            const fetchMessages = async () => {
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (error) console.error(error);
                else setMessages(data);
                setIsLoading(false);
            };

            useEffect(() => {
                fetchMessages();
                const subscription = supabaseClient
                    .channel('public:messages')
                    .on('postgres_changes', { event: '*', table: 'messages' }, () => fetchMessages())
                    .subscribe();
                return () => { supabaseClient.removeChannel(subscription); };
            }, []);

            useEffect(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, [messages, toasts, showAdminPanel, shareMessage]);

            const handleSend = async () => {
                if (!inputText.trim()) return;
                const { error } = await supabaseClient.from('messages').insert([{
                    text: inputText,
                    image: inputImage,
                    author_name: isAnonymous ? 'Anônimo' : senderName,
                    is_anonymous: isAnonymous
                }]);
                if (error) addToast('Erro no banco', 'error');
                else {
                    setInputText(''); setInputImage(null); setSenderName('');
                    addToast('Enviado com sucesso!');
                }
            };

            if (isLoading) return (
                <div className="fixed inset-0 bg-black flex flex-col items-center justify-center gap-6">
                    <div className="w-12 h-12 border border-white/20 border-t-white rounded-full animate-spin"></div>
                    <p className="text-white font-mono text-[10px] tracking-widest uppercase">Sincronizando Database...</p>
                </div>
            );

            return (
                <div className="min-h-screen text-white">
                    {/* Header Principal */}
                    <header className="max-w-xl mx-auto px-6 pt-16 pb-12 flex flex-col items-center justify-center">
                        <div onClick={() => {
                            setAdminClicks(v => v + 1);
                            if(adminClicks + 1 >= 10) { setShowAdminPanel(true); setAdminClicks(0); }
                        }} className="cursor-pointer group flex flex-col items-center">
                            <div className="w-20 h-20 rounded-[2.5rem] overflow-hidden border border-white/10 group-active:scale-95 transition-all shadow-2xl mb-6">
                                <img src={SERVER_ICON} className="w-full h-full object-cover" />
                            </div>
                            <h1 className="text-3xl font-black tracking-tighter uppercase italic">FAC<span className="text-gray-600">.</span>TELL</h1>
                            <p className="text-[10px] tracking-[0.3em] uppercase opacity-40 mt-2 font-bold">Encrypted Database</p>
                        </div>
                    </header>

                    {/* Área de Input */}
                    <main className="max-w-xl mx-auto px-6 pb-24">
                        <div className="relative">
                            <textarea 
                                value={inputText} 
                                onChange={(e) => setInputText(e.target.value)} 
                                placeholder="Sua mensagem para o servidor..." 
                                className="w-full h-64 bg-white/[0.02] border border-white/5 rounded-[3rem] p-12 text-xl focus:outline-none focus:border-white/20 transition-all resize-none placeholder:opacity-20"
                            ></textarea>
                            
                            <div className="absolute bottom-10 left-12 right-12 flex items-center justify-between">
                                <button onClick={() => fileInputRef.current.click()} className={`p-4 rounded-2xl border transition-all ${inputImage ? 'bg-white text-black' : 'bg-white/5 border-white/10 text-gray-500 hover:text-white'}`}>
                                    <i data-lucide="image" className="w-6 h-6"></i>
                                </button>
                                <input type="file" ref={fileInputRef} onChange={(e) => {
                                    const file = e.target.files[0];
                                    if(file) {
                                        const r = new FileReader();
                                        r.onloadend = () => { setInputImage(r.result); addToast('Imagem preparada!'); };
                                        r.readAsDataURL(file);
                                    }
                                }} className="hidden" accept="image/*" />
                                
                                <button onClick={handleSend} disabled={!inputText.trim()} className="w-16 h-16 bg-white text-black rounded-3xl flex items-center justify-center disabled:opacity-10 active:scale-90 shadow-2xl transition-all">
                                    <i data-lucide="send-horizontal" className="w-7 h-7"></i>
                                </button>
                            </div>
                        </div>

                        <div className="mt-8 flex items-center gap-4 px-4">
                            <button onClick={() => setIsAnonymous(!isAnonymous)} className={`flex items-center gap-3 px-6 py-3 rounded-full border text-[10px] font-black uppercase tracking-widest transition-all ${isAnonymous ? 'bg-white/5 border-white/10 text-white/40' : 'bg-white text-black border-white'}`}>
                                <i data-lucide={isAnonymous ? 'eye-off' : 'eye'} className="w-4 h-4"></i>
                                {isAnonymous ? 'Anônimo' : 'Identificado'}
                            </button>
                            {!isAnonymous && (
                                <input type="text" value={senderName} onChange={(e) => setSenderName(e.target.value)} placeholder="NOME DO AGENTE" className="flex-1 bg-white/[0.03] border border-white/10 rounded-full px-6 py-3 text-[10px] font-bold uppercase tracking-widest focus:outline-none focus:border-white/30" />
                            )}
                        </div>
                    </main>

                    {/* Modal do Admin */}
                    {showAdminPanel && (
                        <div className="fixed inset-0 z-50 bg-black/95 backdrop-blur-3xl flex flex-col animate-fade-in">
                            <header className="px-10 py-10 border-b border-white/5 flex items-center justify-between">
                                <h2 className="text-xs font-black uppercase tracking-[0.3em]">Gerenciamento de Logs</h2>
                                <button onClick={() => setShowAdminPanel(false)} className="hover:rotate-90 transition-all opacity-50"><i data-lucide="x"></i></button>
                            </header>
                            <div className="flex-1 overflow-y-auto p-10 space-y-6 max-w-2xl mx-auto w-full custom-scrollbar">
                                {messages.map(msg => (
                                    <div key={msg.id} onClick={() => setShareMessage(msg)} className="bg-white/[0.02] border border-white/5 rounded-[2.5rem] p-10 space-y-6 hover:bg-white/[0.04] transition-all cursor-pointer group">
                                        <div className="flex justify-between items-center">
                                            <div className="flex items-center gap-4">
                                                <div className="w-2 h-2 rounded-full bg-white/20 group-hover:bg-white transition-all"></div>
                                                <span className="text-[10px] font-black tracking-widest uppercase">{msg.author_name}</span>
                                            </div>
                                            <button onClick={async (e) => { 
                                                e.stopPropagation(); 
                                                await supabaseClient.from('messages').delete().eq('id', msg.id);
                                                addToast('Log deletado', 'error');
                                            }} className="opacity-0 group-hover:opacity-100 p-2 text-gray-500 hover:text-red-500 transition-all"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                        </div>
                                        <p className="text-xl leading-relaxed opacity-80 italic">"{msg.text}"</p>
                                        {msg.image && <img src={msg.image} className="w-full h-48 object-cover rounded-3xl border border-white/5" />}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* MODAL DE EXPORTAÇÃO (O CARTÃO QUE VOCÊ QUERIA) */}
                    {shareMessage && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/98" onClick={() => setShareMessage(null)}>
                            <div className="flex flex-col items-center">
                                <div className="capture-wrapper">
                                    <div 
                                        ref={shareRef} 
                                        style={{ width: '1280px', height: '720px', backgroundColor: '#050505' }}
                                        className="relative overflow-hidden flex flex-col justify-between p-20 font-['Inter'] shadow-2xl"
                                        onClick={e => e.stopPropagation()}
                                    >
                                        {/* Background Decorativo - Linhas Minimalistas */}
                                        <svg className="absolute inset-0 w-full h-full opacity-10 pointer-events-none" viewBox="0 0 1280 720">
                                            <path d="M-100,300 Q400,100 640,360 T1380,420" fill="none" stroke="white" strokeWidth="1" strokeDasharray="10,10" />
                                            <path d="M-100,500 Q300,600 800,400 T1380,200" fill="none" stroke="white" strokeWidth="1" />
                                            <circle cx="1100" cy="150" r="100" fill="none" stroke="white" strokeWidth="0.5" strokeDasharray="5,5" />
                                        </svg>

                                        {/* Topo do Card */}
                                        <div className="relative z-10 flex justify-between items-start">
                                            <div className="flex items-center gap-8">
                                                <img src={SERVER_ICON} crossOrigin="anonymous" className="w-24 h-24 rounded-[2rem] border border-white/10" />
                                                <h3 className="text-3xl font-black tracking-[0.3em] uppercase opacity-90">FAC.TELL</h3>
                                            </div>
                                            <div className="text-right flex flex-col items-end">
                                                <span className="text-xl font-mono opacity-30 tracking-[0.2em]">
                                                    {new Date(shareMessage.created_at).toLocaleString('pt-BR')}
                                                </span>
                                                <div className="w-12 h-0.5 bg-white/20 mt-4"></div>
                                            </div>
                                        </div>

                                        {/* Centro - Mensagem e Imagem Anexada */}
                                        <div className="relative z-10 flex flex-col items-center justify-center text-center px-10 gap-10">
                                            {shareMessage.image && (
                                                <div className="w-1/2 rounded-[2rem] overflow-hidden border border-white/10 shadow-2xl">
                                                    <img src={shareMessage.image} crossOrigin="anonymous" className="w-full max-h-[300px] object-cover" />
                                                </div>
                                            )}
                                            <h2 className={`font-black italic text-white leading-tight max-w-[1000px] break-words ${shareMessage.text.length > 50 ? 'text-6xl' : 'text-8xl'}`}>
                                                "{shareMessage.text}"
                                            </h2>
                                        </div>

                                        {/* Rodapé do Card */}
                                        <div className="relative z-10 flex flex-col items-center">
                                            <div className="w-40 h-1 bg-white/10 rounded-full mb-8"></div>
                                            <span className="text-xl font-black tracking-[0.5em] uppercase opacity-30">
                                                {shareMessage.is_anonymous ? 'Mensagem Criptografada' : `Agente: ${shareMessage.author_name}`}
                                            </span>
                                        </div>
                                    </div>
                                </div>

                                {/* Botões de Ação */}
                                <div className="flex gap-6 mt-4 relative z-[70]">
                                    <button onClick={(e) => { e.stopPropagation(); downloadScreenshot(); }} className="px-10 py-5 bg-white text-black rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] hover:scale-105 transition-all flex items-center shadow-white/10 shadow-2xl">
                                        <i data-lucide="download" className="w-4 h-4 mr-3"></i> Baixar Cartão HD
                                    </button>
                                    <button onClick={() => setShareMessage(null)} className="px-10 py-5 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] hover:bg-white/10 transition-all">
                                        Fechar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-0 right-0 p-6 pointer-events-none z-[100]">
                        {toasts.map(t => <Toast key={t.id} {...t} onClose={() => setToasts(prev => prev.filter(x => x.id !== t.id))} />)}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
