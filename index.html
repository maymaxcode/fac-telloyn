<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAC.TELL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.474.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("https://i.pinimg.com/originals/29/6e/6c/296e6c665db819b77621f894ee81acba.gif");
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; overflow-x: hidden; margin: 0;
        }
        .line-detail { position: absolute; background: rgba(255,255,255,0.08); pointer-events: none; }
        .glass-input { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = 'https://pgvuymtbazkhggxpfntr.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_589VB1cAV3RDSCZ-d2LqpA_LN6epmPY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const SERVER_ICON = 'https://cdn.discordapp.com/icons/1492282209334329346/f75c16597efaf255ab914a3ec206e627.webp?size=1024';

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [inputImage, setInputImage] = useState(null);
            const [isAnonymous, setIsAnonymous] = useState(true);
            const [senderName, setSenderName] = useState('');
            const [showAdmin, setShowAdmin] = useState(false);
            const [adminClicks, setAdminClicks] = useState(0);
            const [shareMessage, setShareMessage] = useState(null);
            const shareRef = useRef(null);

            const fetchMessages = async () => {
                const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: false });
                setMessages(data || []);
            };

            useEffect(() => {
                fetchMessages();
                const sub = supabaseClient.channel('messages').on('postgres_changes', { event: '*', table: 'messages' }, fetchMessages).subscribe();
                return () => supabaseClient.removeChannel(sub);
            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [messages, shareMessage, showAdmin]);

            const downloadCard = async () => {
                if (!shareRef.current) return;
                const canvas = await html2canvas(shareRef.current, {
                    scale: 2,
                    backgroundColor: '#050505',
                    useCORS: true,
                    width: 1280,
                    height: 720
                });
                const link = document.createElement('a');
                link.download = `factell-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            const deleteMessage = async (id, e) => {
                e.stopPropagation();
                if(confirm('Deseja apagar esta mensagem permanentemente?')) {
                    await supabaseClient.from('messages').delete().eq('id', id);
                    fetchMessages();
                }
            };

            const handleSend = async () => {
                if(!inputText.trim()) return;
                const { error } = await supabaseClient.from('messages').insert([{ 
                    text: inputText, 
                    author_name: isAnonymous ? 'Anônimo' : (senderName || 'Agente'), 
                    is_anonymous: isAnonymous, 
                    image: inputImage 
                }]);
                if(!error) { setInputText(''); setInputImage(null); }
            };

            return (
                <div className="min-h-screen flex flex-col relative">
                    {/* UI PRINCIPAL */}
                    <header className="max-w-xl mx-auto py-16 text-center w-full">
                        <div onClick={() => { setAdminClicks(v => v + 1); if(adminClicks >= 10) setShowAdmin(true); }} className="cursor-pointer inline-block group">
                            <img src={SERVER_ICON} className="w-24 h-24 rounded-[2.5rem] mx-auto border border-white/10 shadow-2xl mb-6 group-active:scale-90 transition-all" />
                            <h1 className="text-4xl font-black italic tracking-tighter uppercase">FAC<span className="opacity-20">.</span>TELL</h1>
                            <p className="text-[10px] tracking-[0.4em] uppercase opacity-40 font-bold mt-2">Secure Connection</p>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-6 space-y-8 w-full pb-20 flex-1">
                        <div className="relative group">
                            <textarea 
                                value={inputText} 
                                onChange={e => setInputText(e.target.value)} 
                                placeholder="Escreva o telloyn" 
                                className="w-full h-72 glass-input rounded-[3rem] p-10 text-xl focus:outline-none focus:border-white/20 transition-all resize-none placeholder:opacity-10" 
                            />
                            <div className="absolute bottom-8 right-8">
                                <button onClick={handleSend} disabled={!inputText.trim()} className="w-16 h-16 bg-white text-black rounded-3xl flex items-center justify-center disabled:opacity-20 active:scale-90 transition-all shadow-2xl">
                                    <i data-lucide="send-horizontal"></i>
                                </button>
                            </div>
                        </div>

                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsAnonymous(!isAnonymous)} className={`px-6 py-4 rounded-full border text-[10px] font-black uppercase tracking-widest transition-all ${isAnonymous ? 'bg-white/5 border-white/10 opacity-40' : 'bg-white text-black border-white'}`}>
                                {isAnonymous ? 'Anônimo' : 'Identificado'}
                            </button>
                            {!isAnonymous && (
                                <input 
                                    type="text" 
                                    value={senderName} 
                                    onChange={e => setSenderName(e.target.value)} 
                                    placeholder="NOME" 
                                    className="flex-1 glass-input rounded-full px-6 py-4 text-[10px] font-bold uppercase tracking-widest focus:outline-none" 
                                />
                            )}
                        </div>
                    </main>

                    {/* ASSINATURA NA WEB (OPCIONAL, MANTIDA SÓ NA TELA) */}
                    <div className="fixed bottom-4 right-6 text-[9px] font-bold uppercase tracking-[0.2em] opacity-20 pointer-events-none">
                        by @suit
                    </div>

                    {/* MODAL DE ADMIN */}
                    {showAdmin && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-3xl z-50 p-10 overflow-y-auto">
                            <div className="max-w-2xl mx-auto">
                                <div className="flex justify-between items-center mb-12">
                                    <h2 className="text-xs font-black uppercase tracking-[0.4em] opacity-50">Registros Recentes</h2>
                                    <button onClick={() => { setShowAdmin(false); setAdminClicks(0); }} className="p-4 hover:bg-white/10 rounded-full transition-all"><i data-lucide="x"></i></button>
                                </div>
                                <div className="grid gap-4">
                                    {messages.map(m => (
                                        <div key={m.id} onClick={() => setShareMessage(m)} className="p-8 bg-white/[0.03] border border-white/5 rounded-[2.5rem] cursor-pointer hover:bg-white/[0.06] transition-all relative group">
                                            <div className="flex justify-between items-start mb-4">
                                                <span className="text-[10px] font-black uppercase tracking-widest opacity-30">{m.author_name}</span>
                                                <div className="flex gap-2">
                                                    <button onClick={(e) => deleteMessage(m.id, e)} className="p-2 text-red-500/50 hover:text-red-500 transition-all">
                                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                    </button>
                                                    <i data-lucide="external-link" className="w-4 h-4 opacity-20"></i>
                                                </div>
                                            </div>
                                            <p className="text-xl italic opacity-80 leading-relaxed">"{m.text}"</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL DE EXPORTAÇÃO (PRINT) */}
                    {shareMessage && (
                        <div className="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center p-4">
                            <div className="relative shadow-2xl rounded-[2rem] overflow-hidden border border-white/10" 
                                 style={{ width: 'min(90vw, 896px)', height: 'min(50.6vw, 504px)' }}>
                                <div 
                                    ref={shareRef}
                                    style={{ 
                                        width: '1280px', height: '720px', 
                                        position: 'absolute', top: '0', left: '0',
                                        transform: `scale(${Math.min((window.innerWidth * 0.9) / 1280, (window.innerHeight * 0.7) / 720)})`,
                                        transformOrigin: 'top left',
                                        backgroundColor: '#050505'
                                    }}
                                    className="p-24 flex flex-col justify-between"
                                >
                                    <div className="line-detail w-full h-[1px] top-[15%] left-0"></div>
                                    <div className="line-detail w-full h-[1px] bottom-[15%] left-0"></div>
                                    <div className="line-detail h-full w-[1px] left-[10%] top-0"></div>
                                    <div className="line-detail h-full w-[1px] right-[10%] top-0"></div>

                                    {/* ASSINATURA REMOVIDA DAQUI PARA NÃO SAIR NO DOWNLOAD */}

                                    <div className="flex justify-between items-center relative z-10">
                                        <div className="flex items-center gap-8">
                                            <img src={SERVER_ICON} crossOrigin="anonymous" className="w-24 h-24 rounded-[2rem] border border-white/10" />
                                            <div>
                                                <h3 className="text-3xl font-black tracking-[0.4em] uppercase">FAC.TELL</h3>
                                                <p className="text-xs font-bold tracking-[0.2em] opacity-30 mt-1">ENCRYPTED LOG</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-xl font-mono opacity-20 tracking-tighter">
                                                {new Date(shareMessage.created_at).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })}
                                            </span>
                                        </div>
                                    </div>

                                    <div className="text-center px-20 relative z-10 flex flex-col items-center">
                                        {shareMessage.image && (
                                            <img src={shareMessage.image} crossOrigin="anonymous" className="max-h-48 rounded-3xl mb-12 shadow-2xl border border-white/5" />
                                        )}
                                        <h2 className={`font-black italic leading-[1.1] tracking-tight ${shareMessage.text.length > 60 ? 'text-6xl' : 'text-8xl'}`}>
                                            "{shareMessage.text}"
                                        </h2>
                                    </div>

                                    <div className="flex flex-col items-center gap-6 relative z-10">
                                        <div className="w-32 h-1 bg-white/10 rounded-full"></div>
                                        <span className="text-[12px] font-black tracking-[0.6em] uppercase opacity-30">
                                            {shareMessage.is_anonymous ? 'SECURE ANONYMOUS' : `AGENT: ${shareMessage.author_name}`}
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-12 flex gap-6">
                                <button onClick={downloadCard} className="px-12 py-6 bg-white text-black rounded-3xl font-black uppercase tracking-widest hover:scale-105 active:scale-95 transition-all flex items-center gap-4">
                                    <i data-lucide="download" className="w-5 h-5"></i> Baixar Cartão
                                </button>
                                <button onClick={() => setShareMessage(null)} className="px-12 py-6 bg-white/5 border border-white/10 rounded-3xl font-black uppercase tracking-widest">
                                    Voltar
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
