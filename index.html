<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAC.TELL | Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.474.0" crossorigin></script>
    <!-- SDK DO SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --accent: #ffffff; --bg: #0a0a0a; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url("https://i.pinimg.com/originals/9a/14/d3/9a14d30142344970ada7be125bdcf7a6.gif");
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #ffffff; overflow-x: hidden;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mention { background: rgba(255, 255, 255, 0.1); color: #ffffff; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURAÇÃO SUPABASE ---
        // PEGUE ESSES DADOS NO SEU PAINEL DO SUPABASE (Settings > API)
const SUPABASE_URL = 'https://pgvuymtbazkhggxpfntr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_589VB1cAV3RDSCZ-d2LqpA_LN6epmPY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const SERVER_ICON = 'https://cdn.discordapp.com/icons/1492282209334329346/f75c16597efaf255ab914a3ec206e627.webp?size=1024';

        const Toast = ({ message, type, onClose }) => {
            useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
            return (
                <div className={`fixed bottom-6 right-6 z-[100] flex items-center gap-3 px-6 py-4 rounded-2xl border backdrop-blur-xl animate-fade-in ${type === 'success' ? 'bg-white/10 border-white/20 text-white' : 'bg-red-500/20 border-red-500/50 text-white'}`}>
                    <span className="font-medium">{message}</span>
                </div>
            );
        };

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState('');
            const [inputImage, setInputImage] = useState(null);
            const [senderName, setSenderName] = useState('');
            const [isAnonymous, setIsAnonymous] = useState(true);
            const [adminClicks, setAdminClicks] = useState(0);
            const [toasts, setToasts] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [showAdminPanel, setShowAdminPanel] = useState(false);
            const [shareMessage, setShareMessage] = useState(null);
            const fileInputRef = useRef(null);

            // Buscar mensagens do banco
            const fetchMessages = async () => {
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) console.error("Erro ao carregar:", error);
                else setMessages(data);
                setIsLoading(false);
            };

            useEffect(() => {
                fetchMessages();

                // Escutar novas mensagens em tempo real
                const subscription = supabaseClient
                    .channel('public:messages')
                    .on('postgres_changes', { event: '*', table: 'messages' }, () => {
                        fetchMessages();
                    })
                    .subscribe();

                return () => { supabaseClient.removeChannel(subscription); };
            }, []);

            useEffect(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, [messages, toasts, showAdminPanel, shareMessage]);

            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { setInputImage(reader.result); addToast('Imagem anexada!'); };
                    reader.readAsDataURL(file);
                }
            };

            const handleSend = async () => {
                if (!inputText.trim()) return;
                if (!isAnonymous && !senderName.trim()) {
                    addToast('Nome obrigatório para idenficados', 'error');
                    return;
                }

                const { error } = await supabaseClient.from('messages').insert([{
                    text: inputText,
                    image: inputImage,
                    author_name: isAnonymous ? 'Anônimo' : senderName,
                    is_anonymous: isAnonymous
                }]);

                if (error) {
                    addToast('Erro ao salvar no banco', 'error');
                } else {
                    setInputText(''); setInputImage(null); setSenderName('');
                    addToast('Mensagem enviada!');
                }
            };

            const deleteMessage = async (id) => {
                const { error } = await supabaseClient.from('messages').delete().eq('id', id);
                if (error) addToast('Erro ao deletar', 'error');
                else addToast('Removido!', 'error');
            };

            if (isLoading) return (
                <div className="fixed inset-0 bg-black flex flex-col items-center justify-center gap-6">
                    <div className="w-12 h-12 border border-white/20 border-t-white rounded-full animate-spin"></div>
                    <p className="text-white font-mono text-[10px] tracking-widest">CONECTANDO AO BANCO...</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-transparent text-white">
                    <header className="max-w-xl mx-auto px-6 pt-12 pb-8 flex items-center justify-center">
                        <div onClick={() => {
                            setAdminClicks(v => v + 1);
                            if(adminClicks + 1 >= 10) { setShowAdminPanel(true); setAdminClicks(0); }
                        }} className="flex flex-col items-center gap-4 cursor-pointer group">
                            <div className="w-16 h-16 rounded-[2rem] overflow-hidden border border-white/10 group-active:scale-90 transition-all shadow-2xl">
                                <img src={SERVER_ICON} className="w-full h-full object-cover" />
                            </div>
                            <h1 className="text-2xl font-black tracking-tighter uppercase italic">FAC<span className="text-gray-500">.</span>TELL</h1>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto px-6 pb-24">
                        <div className="relative group">
                            <textarea 
                                value={inputText} 
                                onChange={(e) => setInputText(e.target.value)} 
                                placeholder="Escreva algo anonimamente..." 
                                className="w-full h-56 bg-white/[0.03] border border-white/5 rounded-[2.5rem] p-10 text-lg focus:outline-none focus:border-white/20 transition-all resize-none"
                            ></textarea>
                            
                            <div className="absolute bottom-8 left-10 right-10 flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => fileInputRef.current.click()} className={`p-3 rounded-xl border transition-all ${inputImage ? 'bg-white text-black' : 'bg-white/5 border-white/10 text-gray-500'}`}>
                                        <i data-lucide="image" className="w-5 h-5"></i>
                                    </button>
                                    <input type="file" ref={fileInputRef} onChange={handleImageUpload} className="hidden" accept="image/*" />
                                </div>
                                <button onClick={handleSend} disabled={!inputText.trim()} className="w-14 h-14 bg-white text-black rounded-2xl flex items-center justify-center disabled:opacity-20 active:scale-90 shadow-2xl">
                                    <i data-lucide="arrow-up" className="w-6 h-6"></i>
                                </button>
                            </div>
                        </div>

                        <div className="mt-6 flex flex-col gap-4 px-4">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsAnonymous(!isAnonymous)} className={`flex items-center gap-2 px-4 py-2 rounded-full border text-[10px] font-black uppercase tracking-widest ${isAnonymous ? 'bg-white/10 border-white/20 text-white' : 'bg-white text-black border-white'}`}>
                                    <i data-lucide={isAnonymous ? 'eye-off' : 'eye'} className="w-3 h-3"></i>
                                    {isAnonymous ? 'Anônimo' : 'Identificado'}
                                </button>
                                {!isAnonymous && (
                                    <input type="text" value={senderName} onChange={(e) => setSenderName(e.target.value)} placeholder="Seu Nome" className="flex-1 bg-white/[0.03] border border-white/10 rounded-full px-6 py-2 text-[10px] uppercase focus:outline-none" />
                                )}
                            </div>
                        </div>
                    </main>

                    {showAdminPanel && (
                        <div className="fixed inset-0 z-50 bg-[#0a0a0a] flex flex-col animate-fade-in">
                            <header className="px-8 py-8 border-b border-white/5 flex items-center justify-between">
                                <h2 className="text-sm font-black uppercase tracking-widest">Inbox Administrativo (Banco)</h2>
                                <button onClick={() => setShowAdminPanel(false)}><i data-lucide="x"></i></button>
                            </header>
                            <div className="flex-1 overflow-y-auto p-8 space-y-6 max-w-2xl mx-auto w-full custom-scrollbar">
                                {messages.map(msg => (
                                    <div key={msg.id} onClick={() => setShareMessage(msg)} className="bg-white/[0.03] border border-white/5 rounded-[2rem] p-8 space-y-4 hover:bg-white/[0.05] transition-all cursor-pointer">
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <span className="text-[10px] font-bold block">{msg.author_name}</span>
                                                <span className="text-[8px] text-gray-500">{new Date(msg.created_at).toLocaleString()}</span>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); deleteMessage(msg.id); }} className="p-2 text-gray-500 hover:text-red-500"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                        </div>
                                        <p className="text-lg">{msg.text}</p>
                                        {msg.image && <img src={msg.image} className="w-full h-48 object-cover rounded-xl" />}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {shareMessage && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 bg-black/95 backdrop-blur-2xl" onClick={() => setShareMessage(null)}>
                            <div className="relative w-full max-w-2xl bg-black border border-white/10 rounded-[3rem] p-12 text-center animate-fade-in" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between w-full mb-10">
                                    <img src={SERVER_ICON} className="w-12 h-12 rounded-xl" />
                                    <span className="text-[10px] font-mono opacity-20">{new Date(shareMessage.created_at).toLocaleDateString()}</span>
                                </div>
                                <p className="text-3xl font-black italic">"{shareMessage.text}"</p>
                                <button onClick={() => setShareMessage(null)} className="mt-10 text-[10px] font-black uppercase tracking-widest opacity-40">Fechar</button>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-0 right-0 p-6 pointer-events-none">
                        {toasts.map(t => <Toast key={t.id} {...t} onClose={() => setToasts(prev => prev.filter(x => x.id !== t.id))} />)}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
